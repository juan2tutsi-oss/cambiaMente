<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --co:#F4EFE6;--cr:#EDE4D4;--pn:#B89070;--wl:#E8E2D6;--pb:#9E9488;
  --sl:#4A4048;--dk:#2A2428;--md:#7A7074;--li:#F4EFE6;--ln:#D4C8BA;
}
html,body{height:100%;background:var(--co);font-family:Georgia,serif;overflow-x:hidden}
#app{min-height:100vh}
.sans{font-family:-apple-system,BlinkMacSystemFont,sans-serif}
/* HOME */
.h-header{background:var(--sl);padding:28px 20px 20px;text-align:center}
.h-motif{display:flex;justify-content:center;margin-bottom:12px}
.h-eyebrow{font-family:sans-serif;font-size:10px;letter-spacing:2px;color:var(--pn);display:block;margin-bottom:4px}
.h-title{color:var(--li);font-size:22px;font-weight:400;line-height:1.2}
.h-bar-bg{background:rgba(255,255,255,.15);border-radius:20px;height:5px;margin-top:14px;overflow:hidden}
.h-bar-fill{height:100%;background:var(--pn);border-radius:20px;transition:width .5s}
.h-count{font-family:sans-serif;font-size:11px;color:var(--li);opacity:.8;margin-top:5px;display:block}
.h-body{padding:16px}
.h-label{font-family:sans-serif;font-size:10px;letter-spacing:1.5px;color:var(--md);margin-bottom:10px;display:block}
.day-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:16px}
.day-btn{width:100%;aspect-ratio:1;border-radius:6px;border:none;font-family:sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:opacity .15s}
.day-btn.done{background:var(--pn);color:#fff}
.day-btn.cur{background:var(--sl);color:#fff;outline:2px solid var(--pn);outline-offset:1px;font-size:13px}
.day-btn.pend{background:var(--wl);color:var(--md)}
.cta-btn{width:100%;padding:15px;background:var(--sl);color:var(--li);border:none;border-radius:12px;font-size:15px;font-family:Georgia,serif;cursor:pointer;margin-bottom:10px}
.sec-btn{width:100%;padding:12px;background:transparent;color:var(--pb);border:.5px solid var(--ln);border-radius:10px;font-size:13px;font-family:Georgia,serif;cursor:pointer}
.finish-box{background:var(--sl);border-radius:12px;padding:20px;text-align:center;margin-bottom:10px}
.finish-txt{color:var(--pn);font-size:16px;margin-top:10px;display:block}
.finish-sub{font-family:sans-serif;color:var(--li);font-size:13px;margin-top:6px;opacity:.8;display:block}
/* DAY */
.d-header{background:var(--sl);padding:13px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.d-back{background:transparent;border:none;color:var(--pn);font-size:24px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0}
.d-meta{flex:1;min-width:0}
.d-daynum{font-family:sans-serif;font-size:10px;letter-spacing:1.5px;color:var(--pn);display:block}
.d-prog{background:rgba(255,255,255,.12);border-radius:10px;height:3px;margin-top:5px;overflow:hidden}
.d-prog-fill{height:100%;background:var(--pn);border-radius:10px}
.d-check{font-family:sans-serif;font-size:15px;color:var(--pn)}
.d-body{padding:20px 18px 0}
.d-title{font-size:24px;color:var(--dk);line-height:1.2;margin-bottom:18px}
.d-quote{display:flex;margin-bottom:18px}
.d-qbar{width:3px;background:var(--pb);border-radius:2px;flex-shrink:0;margin-right:12px}
.d-qtext{font-style:italic;font-size:15px;color:var(--dk);line-height:1.6}
.d-qauthor{font-family:sans-serif;font-size:11px;color:var(--pb);margin-top:5px;letter-spacing:.5px;display:block}
.d-sec{font-family:sans-serif;font-size:10px;letter-spacing:1.5px;color:var(--pn);display:block;margin-bottom:8px}
.d-para{font-size:15px;color:var(--dk);line-height:1.7;margin-bottom:12px}
.d-brain{background:var(--cr);border-radius:10px;padding:13px 15px;margin-bottom:18px}
.d-bsec{font-family:sans-serif;font-size:9px;letter-spacing:1.5px;color:var(--sl);display:block;margin-bottom:6px}
.d-btext{font-size:14px;color:var(--md);line-height:1.6}
.d-prac{background:var(--wl);border-radius:10px;padding:13px 15px;margin-bottom:18px}
.d-psec{font-family:sans-serif;font-size:9px;letter-spacing:1.5px;color:var(--sl);display:block;margin-bottom:8px}
.d-ptext{font-size:14px;color:var(--dk);line-height:1.6}
.d-fields{margin-bottom:8px}
.d-field{margin-bottom:14px}
.d-flabel{font-family:sans-serif;font-size:11px;color:var(--md);display:block;margin-bottom:6px}
.d-ftxt{width:100%;padding:12px;background:#fff;border:.5px solid var(--ln);border-radius:8px;font-size:16px;color:var(--dk);min-height:80px;resize:vertical;font-family:Georgia,serif;line-height:1.6;outline:none;-webkit-appearance:none}
.d-ftxt:focus{border-color:var(--pb)}
/* tabla 2 col */
.t2{border-radius:8px;overflow:hidden;border:.5px solid var(--ln);margin-bottom:14px}
.t2-headers{display:grid;grid-template-columns:1fr 1fr}
.t2-h{background:var(--sl);padding:8px 10px;font-family:sans-serif;font-size:9px;letter-spacing:1px;color:var(--pn)}
.t2-cells{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--ln)}
.t2-cell{padding:10px;background:var(--cr);font-size:16px;color:var(--dk);min-height:70px;border:none;resize:vertical;font-family:Georgia,serif;outline:none;-webkit-appearance:none}
/* bottom nav */
.d-nav{position:fixed;bottom:0;left:0;right:0;background:var(--co);border-top:.5px solid var(--ln);padding:11px 14px;display:flex;gap:10px}
.d-nav-back{padding:12px 14px;background:transparent;border:.5px solid var(--ln);border-radius:10px;color:var(--md);font-size:13px;cursor:pointer;font-family:Georgia,serif;white-space:nowrap}
.d-nav-main{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-family:Georgia,serif;color:#fff}
.d-nav-done{background:var(--pb)}
.d-nav-pend{background:var(--sl)}
.d-spacer{height:90px}
/* fortalezas */
.f-header{background:var(--sl);padding:13px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.f-back{background:transparent;border:none;color:var(--pn);font-size:24px;cursor:pointer;padding:0 4px;line-height:1}
.f-title{font-family:sans-serif;font-size:10px;letter-spacing:1.5px;color:var(--pn)}
.f-body{padding:18px}
.f-intro{font-size:14px;color:var(--md);line-height:1.7;margin-bottom:18px}
.f-cat{margin-bottom:12px;border-radius:10px;overflow:hidden;border:.5px solid var(--ln)}
.f-cat-h{background:var(--sl);padding:9px 13px;font-family:sans-serif;font-size:10px;letter-spacing:1px;color:var(--pn)}
.f-cat-body{background:var(--cr);padding:11px 13px;display:flex;flex-wrap:wrap;gap:7px}
.f-tag{background:#fff;border:.5px solid var(--ln);border-radius:20px;padding:4px 11px;font-size:13px;color:var(--dk)}
</style>

<script>
// ── PALETA & DATOS ──────────────────────────────────────────────────
const DIAS=[
{id:1,s:1,t:'Por qué lo que sientes\nno depende de lo que pasa',q:'"No nos perturban las cosas, sino la opinión que tenemos de ellas."',a:'Epicteto',i:['El mismo evento puede hundir a una persona y no afectar a otra. La crítica de tu jefe, un mensaje que tarda en ser respondido, un plan que se cancela. La diferencia no está en el evento: está en lo que te dices a ti mismo en el instante siguiente.','Ahí —en ese espacio entre lo que ocurre y lo que sientes— está tu libertad. No siempre puedes cambiar lo que pasa. Pero casi siempre puedes revisar el juicio que le añades.'],b:'El cerebro es plástico: las conexiones que más usas se fortalecen. Cada interpretación que eliges, incluida la voz crítica que llevas dentro, entrena literalmente tus circuitos neuronales.',p:'Recuerda un momento incómodo de esta semana. Separa el hecho (lo que grabaría una cámara) de la interpretación que le pusiste.',c:['El hecho (solo lo observable):','La interpretación que le puse:','Una lectura alternativa, más justa:']},
{id:2,s:1,t:'En qué estás gastando\ntu energía mental',q:'"Hay cosas que dependen de nosotros y cosas que no."',a:'Epicteto',i:['¿Cuánto tiempo de hoy pasaste pensando en la opinión de alguien que no puedes controlar, en algo que ya pasó, o en algo que todavía no ha pasado?','Sufrimos exactamente en la medida en que perseguimos lo que no controlamos. La calma llega cuando regresas tu energía a lo que sí está en tus manos: tus acciones y tus juicios.'],b:'Percibir algo como incontrolable dispara la amígdala. Redirigir la atención a lo que sí puedes influir activa la corteza prefrontal, la zona que regula y calma esa alarma.',p:'Toma algo que te preocupe hoy y repártelo en las dos columnas. Rodea una acción de la izquierda que puedas dar hoy.',t2:['DEPENDE DE MÍ','NO DEPENDE DE MÍ'],c:['La acción que voy a tomar hoy:']},
{id:3,s:1,t:'Por qué tu mente\nexagera lo negativo',q:'"Elige no sentirte perjudicado, y no te sentirás perjudicado."',a:'Marco Aurelio',i:['Una reunión que fue bien, menos ese comentario al final que se quedó dando vueltas horas. Cinco halagos y una crítica —y es la crítica la que recuerdas al acostarte.','Esto no es un defecto: es biología. Tu cerebro evolucionó para detectar amenazas, y lo negativo captura más atención que lo positivo. Reconocerlo es el primer paso.'],b:'Lo negativo capta más atención y se recuerda con más fuerza que lo positivo. Es el sesgo de negatividad. Biología antigua que puedes equilibrar deliberadamente.',p:'Identifica un momento de hoy en que un detalle negativo tiñó todo. Ponlo junto a tres cosas buenas o neutras que también ocurrieron.',c:['El detalle que capturó toda mi atención:','Tres cosas buenas o neutras del mismo día:','¿Fue todo tan negativo como lo sentí?']},
{id:4,s:1,t:'Tu atención es\ntu recurso más escaso',q:'"La vida de una persona es lo que sus pensamientos hacen de ella."',a:'Marco Aurelio',i:['¿Cuánto tiempo de hoy fue a las redes sociales, a preocuparte por algo que no puedes controlar, o a repasar conversaciones que ya terminaron? Ese es tiempo real que no vuelve.','Para los estoicos, tu vida toma la forma de aquello a lo que prestas atención. Elegir dónde poner el foco es una de las pocas cosas que de verdad controlas.'],b:'La atención funciona como un reflector: aquello que enfocas de forma repetida fortalece sus circuitos neuronales y crece en tu experiencia. Entrenar la atención es esculpir el cerebro.',p:'Haz una auditoría honesta de tu atención de hoy. No para juzgarte: para ver qué está construyendo tu mente cada día.',c:['A qué dediqué mi atención hoy:','Qué me gustaría atender más:','Un ajuste pequeño para mañana:']},
{id:5,s:1,t:'Ponerle nombre\na lo que sientes',q:'"Sufrimos más en la imaginación que en la realidad."',a:'Séneca',i:['"Estoy de mal humor" tiene nombres más precisos: frustración, miedo a perder el control, vergüenza, agotamiento, soledad en medio de gente. Lo que no tiene nombre es más difícil de enfrentar.','Ponerle una palabra precisa a lo que sientes lo devuelve a un tamaño manejable. Lo que tiene nombre, se puede observar. Lo que se puede observar, se puede soltar.'],b:'Poner en palabras una emoción —"affect labeling"— reduce la actividad de la amígdala y activa la corteza prefrontal. Nombrar lo que sientes lo calma. Es un cambio medible en el cerebro.',p:'Cada vez que hoy notes un cambio de ánimo, nómbralo con la palabra más precisa que puedas y puntúa su intensidad del 0 al 10.',c:['Situación 1 — emoción exacta e intensidad:','Situación 2 — emoción exacta e intensidad:','Situación 3 — emoción exacta e intensidad:']},
{id:6,s:1,t:'Cuando el problema se ve\nenorme desde adentro',q:'"Contempla las cosas desde lo alto y verás su verdadera medida."',a:'Marco Aurelio',i:['Cuando estás dentro de algo —un conflicto, un error, una decisión difícil— todo parece más grande porque lo ves sin perspectiva. Los estoicos practicaban imaginar su vida desde muy arriba.','Esa distancia no borra el problema. Le devuelve sus proporciones reales. Y cuando algo recupera sus proporciones, deja de paralizarte.'],b:'Verte "desde fuera", como un observador, reduce la reactividad emocional y mejora la capacidad de razonar con calma. La ciencia lo llama autodistanciamiento.',p:'Imagina tu problema visto desde muy lejos: tu ciudad, tu país, el planeta. Descríbelo desde ahí, como lo vería alguien que te aprecia pero no está atrapado dentro de él.',c:['Mi problema visto desde arriba:','¿Importará dentro de cinco años?','Lo que de verdad merece mi energía hoy:']},
{id:7,s:1,t:'Revisión · Semana 1',q:'"No es pobre el que tiene poco, sino el que ansía más."',a:'Séneca',i:['Cierras tu primera semana. Has empezado a ver el espacio entre lo que ocurre y lo que sientes. Ese espacio existía antes —ahora lo puedes usar.','Los estoicos terminaban el día repasándolo con honestidad y gratitud, sin castigarse. Ver lo que hay —y no solo lo que falta— es una habilidad que se entrena.'],b:'Practicar la gratitud con regularidad activa regiones cerebrales ligadas a la recompensa y ayuda a contrarrestar el sesgo de negatividad. Saborear un buen momento prolonga sus efectos.',p:'Haz tu primera revisión semanal. Luego escribe tres gratitudes y, en una de ellas, detente a saborearla de verdad.',c:['Lo que más aprendí esta semana:','La práctica que más me sirvió:','Mi ánimo esta semana (0-10):','Un compromiso para la próxima:','Gratitud 1:','Gratitud 2:','Gratitud 3:']},
{id:8,s:2,t:'El hábito que más rápido\ncambia cómo te sientes',q:'"Al despertar, piensa en el privilegio de estar vivo: de respirar, de pensar, de disfrutar."',a:'Marco Aurelio',i:['La gratitud no es una pose positiva ni negar que hay cosas difíciles. Es una práctica que entrena a la mente a registrar también lo que funciona.','Marco Aurelio empezaba el día recordando el simple privilegio de estar vivo. Ese mismo acto, repetido, cambia el punto de partida emocional de cualquier día.'],b:'Con la repetición, la gratitud desplaza tu punto de partida emocional: estudios muestran mejoras sostenidas en el ánimo y el bienestar tras unas semanas de práctica.',p:'Escribe cinco cosas por las que estás agradecido hoy. Luego elige a una persona y agradécele por dentro, con detalle.',c:['Gratitud 1:','Gratitud 2:','Gratitud 3:','Gratitud 4:','Gratitud 5:','La persona a la que quiero agradecer y por qué:']},
{id:9,s:2,t:'Lo bueno que\npasa en automático',q:'"Confínate al presente."',a:'Marco Aurelio',i:['¿Cuántas veces estás haciendo algo que te gusta pero ya estás pensando en lo siguiente? El café de la mañana mientras revisas el teléfono. Un momento de quietud que dejas pasar.','Los estoicos insistían en habitar el presente: es lo único que de verdad posees. Saborear lo bueno, en vez de dejarlo pasar en automático, es una forma de riqueza que no requiere nada externo.'],b:'Las emociones positivas "amplían y construyen": ensanchan tu forma de pensar y crean recursos psicológicos duraderos. Detenerte a saborear un momento agradable intensifica ese efecto.',p:'Elige hoy un momento agradable, por pequeño que sea, y detente 30 segundos a saborearlo con todos los sentidos. Sin teléfono.',c:['El momento que saboreé:','Qué noté al detenerme en él:','Cómo puedo crear más momentos así:']},
{id:10,s:2,t:'La historia que te cuentas\ncambia lo que sientes',q:'"No es lo que sucede, sino cómo reaccionas, lo que importa."',a:'Epicteto',i:['Dos personas pierden una oportunidad. Una piensa: "siempre me pasa, soy malo para esto." La otra piensa: "esta vez no salió, ¿qué puedo aprender?" La diferencia está en la historia que cada una se cuenta.','Los estoicos entrenaban una lectura serena y útil de los reveses, sin negar la realidad. Eso también se aprende.'],b:'La investigación muestra que el optimismo se aprende: quien explica los problemas como temporales y puntuales ("esto es pasajero") resiste mejor que quien los ve permanentes y globales.',p:'Piensa en un revés reciente. Revisa cómo te lo explicaste y reescríbelo en versión temporal y específica.',c:['El revés y cómo me lo expliqué:','Versión más justa (pasajera y puntual):','Qué depende de mí para mejorarlo:']},
{id:11,s:2,t:'Lo que ya haces bien\ny quizás no ves',q:'"Mira hacia dentro; dentro está la fuente del bien."',a:'Marco Aurelio',i:['Es más fácil señalar lo que falla que reconocer lo que funciona. Tendemos a dar por sentado nuestras fortalezas —precisamente porque nos salen con naturalidad.','El estoicismo se ordena en cuatro virtudes: sabiduría, coraje, justicia y templanza. La psicología positiva identificó 24 fortalezas de carácter. No son ideales lejanos: son cosas que ya usas.'],b:'Usar tus "fortalezas distintivas" de una forma nueva aumenta el bienestar durante meses. No se trata de corregir debilidades: se trata de construir desde lo que ya tienes.',p:'Elige una de tus fortalezas más naturales y piensa una forma nueva de usarla hoy. Las 24 fortalezas están en el botón de abajo.',c:['Mi fortaleza más natural:','Una forma nueva de usarla hoy:','Cómo me sentí al hacerlo:']},
{id:12,s:2,t:'La persona\nque quieres ser',q:'"Primero decide quién quieres ser; luego actúa en consecuencia."',a:'Epicteto',i:['Los estoicos tenían clara la persona que aspiraban a ser y dejaban que esa imagen guiara sus actos del presente. No en términos de logros o posesiones, sino de carácter.','Tener un norte ordena las decisiones del presente. Cuando sabes quién quieres ser, muchas elecciones pequeñas se vuelven más claras.'],b:'El ejercicio del "mejor yo posible" —imaginarte a futuro habiendo logrado lo que importa— aumenta el optimismo y el ánimo positivo de forma medible. Visualizar con detalle enciende la motivación.',p:'Imagina tu vida dentro de un año, en tu mejor versión realista. Descríbela con detalle desde dentro: cómo eres, cómo actúas, cómo te sientes. No qué tienes —quién eres.',c:['Mi mejor versión posible, dentro de un año:','¿Qué haría diferente hoy esa persona?']},
{id:13,s:2,t:'Por qué ayudar\na otros te ayuda a ti',q:'"Lo que no beneficia a la colmena, tampoco beneficia a la abeja."',a:'Marco Aurelio',i:['Para los estoicos, la justicia y el servicio a otros son parte de una vida buena. La conexión con otros no es opcional para el florecimiento humano.','Ayudar no es solo ético: también es una de las fuentes de bienestar más consistentes que conoce la investigación psicológica.'],b:'Los actos de bondad activan los circuitos de recompensa del cerebro y elevan el bienestar de quien los realiza, no solo de quien los recibe. Dar, literalmente, nos hace sentir mejor.',p:'Planea y realiza hoy un acto de bondad concreto, por pequeño que sea, sin esperar nada a cambio.',c:['El acto de bondad que hice:','Cómo reaccionó la otra persona:','Cómo me sentí yo:']},
{id:14,s:2,t:'Revisión · Semana 2',q:'"El progreso no es un accidente, sino fruto del esfuerzo constante."',a:'Epicteto',i:['Ya sabes cultivar lo positivo: gratitud, saboreo, optimismo, fortalezas, bondad. Estas prácticas no ignoran lo difícil; construyen los recursos con los que después lo afrontarás.','El bienestar no es solo ausencia de malestar: es algo que se construye activamente.'],b:'Cada práctica positiva que repites deja huella en tus circuitos y ensancha tu margen de calma.',p:'Segunda revisión semanal. Anota qué práctica de esta semana quieres conservar sí o sí.',c:['Lo que más aprendí esta semana:','La práctica que más me sirvió:','Mi ánimo esta semana (0-10):','Un compromiso para la próxima:','Gratitud 1:','Gratitud 2:','Gratitud 3:']},
{id:15,s:3,t:'Cómo salir del bucle\nde esperar a tener ganas',q:'"No hables más de cómo debe ser una buena persona: sélo."',a:'Marco Aurelio',i:['La mayoría de las cosas que postergamos no esperan a que tengamos ganas. Esperan indefinidamente. Hay un malentendido muy extendido sobre la motivación: creemos que tiene que aparecer antes de actuar.','Marco Aurelio desconfiaba de las buenas intenciones sin acción. La motivación casi nunca precede a la acción: muchas veces la sigue.'],b:'Dar un primer paso pequeño libera dopamina —el neurotransmisor de la anticipación—, que impulsa el siguiente paso.',p:'Elige una tarea mínima que vengas posponiendo y hazla hoy. No la versión completa: el primer paso, el más pequeño posible.',c:['La tarea pequeña que haré hoy:','¿Cuándo exactamente?','Cómo me sentí después de hacerla:']},
{id:16,s:3,t:'Cuando te absorbes tanto\nque el tiempo desaparece',q:'"Concéntrate en lo que haces con seria y sencilla dignidad."',a:'Marco Aurelio',i:['¿Cuándo fue la última vez que estuviste tan dentro de algo que olvidaste revisar el teléfono? Tan absorto en una tarea, una conversación, una actividad creativa, que el tiempo pareció desaparecer.','Los estoicos valoraban la entrega plena a la tarea presente, hecha con excelencia. Esa absorción tranquila es una de las formas más profundas de bienestar.'],b:'El "flow" aparece cuando el reto de una actividad iguala tus habilidades: ni tan fácil que aburra, ni tan difícil que angustie. En ese punto el cerebro se concentra por completo.',p:'Diseña un rato de fluir para hoy: una actividad absorbente, sin distracciones, con un reto a tu medida. Teléfono en silencio.',c:['Mi actividad para fluir hoy:','Cómo eliminaré distracciones:','Cómo ajusto el reto a mi nivel:']},
{id:17,s:3,t:'La palanca más rápida\npara bajar la ansiedad',q:'"Tienes poder sobre tu mente, no sobre los sucesos externos."',a:'Marco Aurelio',i:['Tu respiración es la única función del sistema nervioso autónomo que puedes controlar conscientemente. Antes de una conversación difícil, cuando la ansiedad sube: la respiración es tu acceso directo al sistema de calma del cuerpo.','Los estoicos buscaban la serenidad ante lo que no controlan. Tu respiración es una de las pocas puertas directas a esa calma, disponible siempre, sin costar nada.'],b:'La respiración lenta —sobre todo alargar la exhalación— activa el nervio vago y el sistema parasimpático, que bajan el ritmo cardíaco y ayudan a calmar la amígdala.',p:'Prueba ahora: inhala 4 segundos, exhala 6, durante 2–3 minutos. Si te marea o incomoda, vuelve a respirar con normalidad.',c:['Cómo me sentí antes:','Cómo me sentí después:','¿Cuándo me vendría bien usarlo?']},
{id:18,s:3,t:'Por qué lo que\nevitas crece',q:'"No porque las cosas sean difíciles no nos atrevemos: porque no nos atrevemos, se vuelven difíciles."',a:'Séneca',i:['¿Hay algo que evitas? Una conversación pendiente, un proyecto que da vértigo empezar, una situación que genera ansiedad.','Séneca vio que la evitación agranda los miedos. Acercarse poco a poco, a tu ritmo, es la forma serena de recuperar terreno.'],b:'Evitar lo que tememos calma a corto plazo, pero refuerza los circuitos del miedo. Acercarse de forma gradual permite que el cerebro aprenda que la amenaza era menor de lo esperado.',p:'Elige algo que evitas. Escribe 3 pasos graduales de menor a mayor dificultad. Haz el paso 1 hoy.',t2:['PASO 1 (más fácil)','PASO 2 (más difícil)'],c:['Paso 3 (el más difícil) y mi nivel de ansiedad:']},
{id:19,s:3,t:'Cómo parar de darle\nvueltas a lo mismo',q:'"No te angusties por todo el curso de tu vida a la vez."',a:'Marco Aurelio',i:['Hay un tipo de preocupación que no resuelve nada: la que da vueltas sobre el mismo problema sin llegar a ninguna conclusión ni acción. Se activa sola —antes de dormir, en la ducha, manejando.','La clave no es suprimir los pensamientos, sino darles un espacio delimitado. Fuera de ese espacio, los aplazas con una promesa real de atenderlos.'],b:'La rumiación se asocia con la red neuronal por defecto, activa cuando la mente divaga. Reservar un tiempo acotado de preocupación y redirigir la atención el resto del día interrumpe ese bucle.',p:'Fija una "hora de preocuparte" de 15 minutos para hoy. Fuera de esa cita, cuando algo aparezca, anótalo aquí.',c:['Mi hora de preocuparme (hora exacta):','Lo que aplacé para esa cita:','¿Cuánto seguía importando al llegar?']},
{id:20,s:3,t:'El trato que te das\ncuando algo sale mal',q:'"Sé indulgente con los demás, y también contigo mismo."',a:'Séneca',i:['Cuando algo sale mal, ¿cómo te hablas? "Qué tonto soy", "siempre me pasa lo mismo", "nunca aprendo". Si le hablaras así a alguien que quieres que cometió el mismo error, no lo tendrías mucho tiempo como amigo.','Los estoicos aspiraban a la justicia —y ser justo también significa no tratarte con una crueldad que nunca usarías con otro. La autocompasión no es excusa: es sensatez.'],b:'La autocrítica dura mantiene encendido el sistema de amenaza del cerebro. La autocompasión se asocia con menor cortisol y activa el sistema de calma y cuidado.',p:'Escribe la crítica más dura que te dijiste esta semana. Reescríbela como se la dirías a alguien que quieres en la misma situación.',c:['Lo que me dije (crítico):','Lo que le diría a alguien que quiero:','Cómo cambia si me hablo así:']},
{id:21,s:3,t:'Revisión · Semana 3',q:'"El bien fluye de tus propias acciones, no de las circunstancias."',a:'Marco Aurelio',i:['Esta semana pasaste de pensar a regular y actuar: respiración, acción, exposición gradual, autocompasión. El carácter, decían los estoicos, se forja en lo que haces, no en lo que sientes.'],b:'Regular la emoción y actuar pese al malestar fortalece la corteza prefrontal. Cuanto más lo ejercitas, más disponible está cuando lo necesitas.',p:'Tercera revisión semanal. Anota qué acción, por pequeña que fuera, te hizo sentir más en control.',c:['Lo que más aprendí esta semana:','La práctica que más me sirvió:','Mi ánimo esta semana (0-10):','Un compromiso para la próxima:','Gratitud 1:','Gratitud 2:','Gratitud 3:']},
{id:22,s:4,t:'Preparar la mente\npara lo que puede ir mal',q:'"El que se ha preparado para lo peor soporta con calma lo que llega."',a:'Séneca',i:['La "premeditatio malorum" no es pesimismo ni catastrofismo: es imaginar con calma un contratiempo posible para desactivar su sorpresa y tener un plan.','Lo previsto asusta menos que lo imprevisto. Prepararse no es rendirse: es llegar en mejores condiciones.'],b:'Al cerebro le angustia la incertidumbre. Contrastar mentalmente lo que deseas con el obstáculo probable —y planear tu respuesta— reduce la ansiedad y aumenta la constancia.',p:'Piensa en un reto que se acerca. Imagina un contratiempo probable y escribe cómo lo afrontarías. No para que ocurra: para que deje de asustarte.',c:['Reto que se acerca:','Un contratiempo probable:','Mi plan si ocurre:']},
{id:23,s:4,t:'Qué harías distinto si\nel tiempo fuera limitado',q:'"No vivas como si tuvieras diez mil años por delante."',a:'Marco Aurelio',i:['¿Cuántas cosas estás esperando para cuando tengas más tiempo, más dinero, más energía? La vida que quieres vivir no está esperando al otro lado de las condiciones perfectas.','Recordar que la vida es finita no es mórboso: es la forma estoica de dejar de posponer lo que importa y de soltar lo que no importa tanto como creías.'],b:'La conciencia de la finitud aclara los valores. Y vivir con sentido —tener un porqué— es uno de los mejores predictores de bienestar y salud a largo plazo.',p:'Si supieras que este año importa de verdad, ¿qué dejarías de posponer y qué dejarías de tomarte tan en serio?',c:['Lo que dejaría de posponer:','Lo que dejaría de tomarme tan en serio:','Algo que haré distinto esta semana:']},
{id:24,s:4,t:'Hacer las paces con\nlo que no salió como querías',q:'"No busques que las cosas sucedan como quieres; quiere que sucedan como suceden, y tu vida fluirá serena."',a:'Epicteto',i:['"Amor fati" —amar el propio destino— no es resignarse ni fingir que todo está bien. Es dejar de pelear con la realidad y usar esa energía en responder bien.','Incluye el camino que tomaste, la oportunidad que no llegó, el tiempo que ya pasó. No significa que no dolió. Significa que dejas de gastar energía en resistir lo que ya ocurrió.'],b:'Reinterpretar el significado de lo que vives —la reevaluación cognitiva— es la estrategia de regulación emocional más eficaz según la investigación.',p:'Piensa en algo que no salió como querías. Pásalo por las preguntas del reencuadre.',c:['¿Qué ocurrió?','¿Qué me dije por dentro automáticamente?','¿Qué sentí y con qué intensidad (0-100%)?','Otra forma de verlo (más útil y realista):','¿Qué aprendo o aprovecho?','¿Cómo me siento ahora (0-100%)?']},
{id:25,s:4,t:'Lo que la dificultad tiene\nque el éxito fácil no tiene',q:'"Lo que se interpone en el camino se convierte en el camino."',a:'Marco Aurelio',i:['El rechazo, el fracaso, el período difícil. Cada obstáculo trae dentro una oportunidad de ejercitar algo: paciencia, coraje, adaptabilidad, creatividad. El muro no solo estorba: también entrena.','Lo que haces con lo difícil define quién eres más que lo que haces cuando todo es fácil.'],b:'Ver el estrés como un desafío que te fortalece —y no solo como una amenaza que te daña— cambia incluso tu respuesta fisiológica a él.',p:'Toma un obstáculo actual. ¿Qué fortaleza te pide desarrollar? ¿Qué oportunidad, aunque pequeña, abre?',c:['Mi obstáculo:','La fortaleza que me pide desarrollar:','La oportunidad escondida en él:']},
{id:26,s:4,t:'Convertir lo que practicas\nhoy en quien serás',q:'"Cada hábito y facultad se fortalece con la acción que le corresponde."',a:'Epicteto',i:['Somos lo que hacemos repetidamente. No el gran gesto de un día: la pequeña acción de todos los días. El hábito de escribir tres gratitudes. El hábito de separar hecho de interpretación.','El carácter se construye con la constancia, no con gestos aislados. Y la constancia importa más que la perfección.'],b:'Los hábitos viven en los ganglios basales y siguen un bucle: señal → rutina → recompensa. Con la repetición, la conducta se vuelve más automática.',p:'Diseña un hábito pequeño que quieras instalar. Define su señal, la rutina y la recompensa.',c:['Señal (qué lo dispara):','Rutina (la conducta que quiero):','Recompensa (qué gano al hacerlo):','¿Cuándo y dónde lo haré?']},
{id:27,s:4,t:'El ritual para terminar\nel día sin carga mental',q:'"Recógete en ti mismo."',a:'Marco Aurelio',i:['Séneca examinaba cada noche su jornada con serenidad: qué hizo bien, qué mejoraría, sin castigarse. El examen estoico nocturno no es autocrítica: es revisión honesta seguida de cierre.','Un buen cierre descarga la mente antes de dormir. Lo que queda sin nombrar tiende a volver de noche.'],b:'El sueño consolida lo aprendido durante el día y ayuda a regular la amígdala. Un cierre mental tranquilo y una buena higiene del sueño se potencian mutuamente.',p:'Prueba esta noche el examen estoico: una cosa que hiciste bien, una que mejorarías, y suelta el resto.',c:['Hoy hice bien:','Mañana mejoraría:','Mi ajuste para dormir mejor:']},
{id:28,s:4,t:'Por qué tus vínculos predicen\ntu bienestar más que casi cualquier otra cosa',q:'"Nacimos para colaborar."',a:'Marco Aurelio',i:['La investigación sobre bienestar a largo plazo es consistente: la calidad de tus relaciones predice mejor tu salud y tu felicidad que casi cualquier otro factor. Más que el dinero, más que la posición.','Los estoicos veían al ser humano como parte de un todo, unido a los demás en círculos de pertenencia. Cuidar los vínculos no es un lujo: es parte de una vida buena.'],b:'La calidad de tus relaciones es uno de los predictores más fuertes de bienestar y de una vida larga y sana. Conectar con otros activa sistemas de calma y confianza en el cerebro.',p:'Da hoy un paso de conexión real: un mensaje sincero, una llamada, o un rato de atención plena con alguien que te importa. Sin el teléfono de por medio.',c:['A quién quiero acercarme hoy:','Qué paso concreto daré:','Cómo me sentí al hacerlo:']},
{id:29,s:4,t:'Una carta para\nquien serás',q:'"Cada día, adquiere algo que te fortalezca contra la adversidad."',a:'Séneca',i:['Escribir a tu yo futuro consolida lo aprendido y deja un ancla a la que volver. Cuando lleguen días difíciles —y llegarán— esta carta te la escribió quien mejor te conoce: tú mismo, en un momento de claridad.','Recuérdale lo que aprendiste estos 30 días. Lo que no quieres olvidar. Lo que vale la pena seguir intentando.'],b:'Sentirte conectado con tu "yo del futuro" —verlo como alguien real y cercano— mejora las decisiones que tomas hoy a su favor. Escribirle acorta esa distancia.',p:'Escribe una carta a la persona que serás dentro de seis meses. Recuérdale lo que aprendiste y lo que no quiere olvidar.',c:['Querido yo del futuro:','Lo que no quiero que olvides:','Lo que más me ha cambiado en estos 30 días:']},
{id:30,s:4,t:'Tu sistema para seguir',q:'"La constancia en las pequeñas cosas construye un carácter fuerte."',a:'Marco Aurelio',i:['Terminaste 30 días. No es una meta: es un comienzo. La calma y el florecimiento son prácticas, no destinos. Hoy eliges lo que se queda contigo.','Durante estas semanas entrenaste circuitos reales: atención, gratitud, regulación, acción. La plasticidad no se detiene; lo que sigas practicando, seguirá fortaleciéndose.'],b:'Un plan simple sostiene el cambio mejor que la motivación sola. No necesitas hacerlo todo: necesitas hacer algo todos los días.',p:'Elige las 3 prácticas que se vuelven tu rutina. Evalúa tu florecimiento en los 5 pilares (PERMA).',c:['Práctica 1 que me quedo:','Práctica 2 que me quedo:','Práctica 3 que me quedo:','Emoción positiva (P) 0-10:','Entrega/fluir (E) 0-10:','Relaciones (R) 0-10:','Sentido (M) 0-10:','Logro (A) 0-10:']}
];

const FORTS=[
  {cat:'Sabiduría',items:['Creatividad','Curiosidad','Juicio crítico','Amor por aprender','Perspectiva']},
  {cat:'Coraje',items:['Valentía','Perseverancia','Honestidad','Vitalidad']},
  {cat:'Humanidad',items:['Amor','Amabilidad','Inteligencia social']},
  {cat:'Justicia',items:['Trabajo en equipo','Equidad','Liderazgo']},
  {cat:'Templanza',items:['Perdón','Humildad','Prudencia','Autorregulación']},
  {cat:'Trascendencia',items:['Apreciación de la belleza','Gratitud','Esperanza','Humor','Sentido']}
];

// ── ESTADO ──────────────────────────────────────────────────────────
const KEY='ma30v2';
let SC='home', DI=0, ANS={}, DONE=new Set();

function loadS(){
  try{
    const d=JSON.parse(localStorage.getItem(KEY)||'{}');
    ANS=d.a||{}; DONE=new Set(d.d||[]); DI=d.i||0;
  }catch(e){}
}
function saveS(){
  try{localStorage.setItem(KEY,JSON.stringify({a:ANS,d:[...DONE],i:DI}));}catch(e){}
}

// ── MOTIVO SVG ──────────────────────────────────────────────────────
function motifSVG(s=48,c='#B89070'){
  const pts=[45,135,225,315].map(d=>{
    const r=d*Math.PI/180;
    return `<circle cx="${50+48*Math.cos(r)}" cy="${50+48*Math.sin(r)}" r="5" fill="none" stroke="${c}" stroke-width="0.8"/>`;
  }).join('');
  return`<svg width="${s}" height="${s}" viewBox="0 0 100 100" style="display:block">
    <circle cx="50" cy="50" r="8" fill="${c}"/>
    <circle cx="50" cy="50" r="22" fill="none" stroke="${c}" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="${c}" stroke-width="0.8"/>
    <line x1="5" y1="50" x2="95" y2="50" stroke="${c}" stroke-width="0.8"/>
    <line x1="50" y1="5" x2="50" y2="95" stroke="${c}" stroke-width="0.8"/>
    ${pts}</svg>`;
}

// ── RENDER HOME ─────────────────────────────────────────────────────
function renderHome(){
  const next=DIAS.findIndex((_,i)=>!DONE.has(i));
  const nx=next===-1?29:next;
  const pct=Math.round(DONE.size/30*100);
  const grid=DIAS.map((d,i)=>{
    const ok=DONE.has(i),cur=i===nx&&!ok;
    const cls=ok?'done':cur?'cur':'pend';
    return`<button class="day-btn ${cls}" data-action="go" data-day="${i}">${d.id}</button>`;
  }).join('');
  const bottom=DONE.size===30
    ?`<div class="finish-box">${motifSVG(40,'#B89070')}<span class="finish-txt">¡30 días completados!</span><span class="finish-sub">La calma no es un destino, es una práctica.</span></div>`
    :`<button class="cta-btn" data-action="go" data-day="${nx}">Continuar con el Día ${nx+1} →</button>`;
  document.getElementById('app').innerHTML=`
    <div class="h-header">
      ${motifSVG(50,'#B89070')}
      <span class="h-eyebrow">cambia</span>
      <div class="h-title">MENTE</div>
      <div class="h-bar-bg"><div class="h-bar-fill" style="width:${pct}%"></div></div>
      <span class="h-count">${DONE.size} / 30 días completados</span>
    </div>
    <div class="h-body">
      <span class="h-label">TUS DÍAS</span>
      <div class="day-grid">${grid}</div>
      ${bottom}
      <button class="sec-btn" data-action="forts">24 Fortalezas de Carácter →</button>
    </div>`;
}

// ── RENDER DAY ──────────────────────────────────────────────────────
function renderDay(){
  const d=DIAS[DI];
  const isDone=DONE.has(DI);
  const pct=Math.round((DI/29)*100);
  const titleHTML=d.t.replace('\n','<br>');
  const ideasHTML=d.i.map(p=>`<div class="d-para">${p}</div>`).join('');

  let tabla2HTML='';
  if(d.t2){
    const v0=ANS[`d${DI}_t0`]||'',v1=ANS[`d${DI}_t1`]||'';
    tabla2HTML=`<div class="t2">
      <div class="t2-headers"><div class="t2-h">${d.t2[0]}</div><div class="t2-h">${d.t2[1]}</div></div>
      <div class="t2-cells">
        <textarea class="t2-cell" data-key="d${DI}_t0" placeholder="...">${esc(v0)}</textarea>
        <textarea class="t2-cell" data-key="d${DI}_t1" placeholder="...">${esc(v1)}</textarea>
      </div></div>`;
  }

  const fieldsHTML=d.c.map((label,f)=>{
    const v=ANS[`d${DI}_f${f}`]||'';
    return`<div class="d-field">
      <span class="d-flabel">${label}</span>
      <textarea class="d-ftxt" data-key="d${DI}_f${f}" placeholder="Escribe aquí...">${esc(v)}</textarea>
    </div>`;
  }).join('');

  const navBack=DI>0?`<button class="d-nav-back" data-action="go" data-day="${DI-1}">← Ant.</button>`:'';
  const navMain=isDone
    ?(DI<29?`<button class="d-nav-main d-nav-done" data-action="go" data-day="${DI+1}">Siguiente →</button>`
            :`<button class="d-nav-main d-nav-done" data-action="home">Ver progreso →</button>`)
    :`<button class="d-nav-main d-nav-pend" data-action="complete">Marcar completado ✓</button>`;

  document.getElementById('app').innerHTML=`
    <div class="d-header">
      <button class="d-back" data-action="home">←</button>
      <div class="d-meta">
        <span class="d-daynum">SEMANA ${d.s} · DÍA ${d.id}</span>
        <div class="d-prog"><div class="d-prog-fill" style="width:${pct}%"></div></div>
      </div>
      ${isDone?'<span class="d-check">✓</span>':''}
    </div>
    <div class="d-body">
      <div class="d-title">${titleHTML}</div>
      <div class="d-quote">
        <div class="d-qbar"></div>
        <div>
          <div class="d-qtext">${d.q}</div>
          <span class="d-qauthor">— ${d.a}</span>
        </div>
      </div>
      <span class="d-sec">LA IDEA</span>
      ${ideasHTML}
      <div class="d-brain">
        <span class="d-bsec">◇  TU CEREBRO EN ESTO</span>
        <div class="d-btext">${d.b}</div>
      </div>
      <div class="d-prac">
        <span class="d-psec">TU PRÁCTICA DE HOY</span>
        <div class="d-ptext">${d.p}</div>
      </div>
      ${tabla2HTML}
      <div class="d-fields">${fieldsHTML}</div>
      <div class="d-spacer"></div>
    </div>
    <div class="d-nav">${navBack}${navMain}</div>`;
}

// ── RENDER FORTALEZAS ────────────────────────────────────────────────
function renderForts(){
  const cats=FORTS.map(v=>`
    <div class="f-cat">
      <div class="f-cat-h">${v.cat.toUpperCase()}</div>
      <div class="f-cat-body">${v.items.map(it=>`<span class="f-tag">${it}</span>`).join('')}</div>
    </div>`).join('');
  document.getElementById('app').innerHTML=`
    <div class="f-header">
      <button class="f-back" data-action="home">←</button>
      <span class="f-title">24 FORTALEZAS DE CARÁCTER</span>
    </div>
    <div class="f-body">
      <div class="f-intro">La psicología positiva agrupa las fortalezas humanas en seis virtudes. Usar tus fortalezas más naturales de formas nuevas es una de las vías más probadas hacia el bienestar.</div>
      ${cats}
    </div>`;
}

// ── RENDER ──────────────────────────────────────────────────────────
function render(){
  if(SC==='home')renderHome();
  else if(SC==='day')renderDay();
  else if(SC==='forts')renderForts();
  window.scrollTo(0,0);
}

// ── HELPERS ─────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── EVENTOS ─────────────────────────────────────────────────────────
document.getElementById('app').addEventListener('click',e=>{
  const btn=e.target.closest('[data-action]');
  if(!btn)return;
  const act=btn.dataset.action;
  if(act==='go'){DI=parseInt(btn.dataset.day);SC='day';render();}
  else if(act==='home'){SC='home';render();}
  else if(act==='forts'){SC='forts';render();}
  else if(act==='complete'){
    DONE.add(DI);saveS();
    if(DI<29){DI++;SC='day';render();}
    else{SC='home';render();}
  }
});

document.getElementById('app').addEventListener('input',e=>{
  const t=e.target;
  if(t.dataset.key){
    ANS[t.dataset.key]=t.value;
    saveS();
  }
});

// ── INICIO ──────────────────────────────────────────────────────────
loadS();
render();
</script>

<div id="install-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#4A4048;padding:14px 16px;z-index:999;align-items:center;gap:10px">
  <div style="flex:1;color:#F4EFE6;font-family:Georgia,serif;font-size:14px;line-height:1.4">Agregar a la pantalla de inicio para usar como app</div>
  <button onclick="installApp()" style="background:#B89070;color:#F4EFE6;border:none;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;white-space:nowrap;font-family:Georgia,serif">Instalar</button>
  <button onclick="document.getElementById('install-banner').style.display='none'" style="background:transparent;border:none;color:#9E9488;font-size:22px;cursor:pointer;padding:0 4px;line-height:1">×</button>
</div>


<script>
// Service Worker — offline cache
let deferredPrompt=null;
if('serviceWorker' in navigator){
  const swCode=`const CACHE='ma30-v1';
self.addEventListener('install',e=>e.waitUntil(
  caches.open(CACHE).then(c=>c.addAll([location.pathname]))
));
self.addEventListener('fetch',e=>e.respondWith(
  caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match(e.request)))
));`;
  const blob=new Blob([swCode],{type:'text/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
// Prompt de instalación (Android Chrome)
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  const b=document.getElementById('install-banner');
  if(b){b.style.display='flex';}
});
function installApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{
      deferredPrompt=null;
      const b=document.getElementById('install-banner');
      if(b)b.style.display='none';
    });
  }
}
window.addEventListener('appinstalled',()=>{
  const b=document.getElementById('install-banner');
  if(b)b.style.display='none';
});
</script>
